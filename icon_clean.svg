<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2a35"/>
      <stop offset="100%" stop-color="#1a1a20"/>
    </radialGradient>
    <radialGradient id="vinyl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a20"/>
      <stop offset="30%" stop-color="#222230"/>
      <stop offset="50%" stop-color="#1a1a20"/>
      <stop offset="65%" stop-color="#252535"/>
      <stop offset="80%" stop-color="#1a1a20"/>
      <stop offset="100%" stop-color="#2a2a35"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#f0d68a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <radialGradient id="label" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#6699cc"/>
      <stop offset="60%" stop-color="#3c5078"/>
      <stop offset="100%" stop-color="#2a3a55"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="url(#gold)" stroke-width="4"/>

  <!-- Vinyl record -->
  <circle cx="256" cy="256" r="200" fill="url(#vinyl)" stroke="#333" stroke-width="1.5"/>

  <!-- Vinyl grooves -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#2d2d3a" stroke-width="0.7" opacity="0.6"/>
  <circle cx="256" cy="256" r="178" fill="none" stroke="#2d2d3a" stroke-width="0.7" opacity="0.6"/>
  <circle cx="256" cy="256" r="166" fill="none" stroke="#2d2d3a" stroke-width="0.7" opacity="0.6"/>
  <circle cx="256" cy="256" r="154" fill="none" stroke="#2d2d3a" stroke-width="0.7" opacity="0.6"/>
  <circle cx="256" cy="256" r="142" fill="none" stroke="#2d2d3a" stroke-width="0.7" opacity="0.6"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="#2d2d3a" stroke-width="0.7" opacity="0.6"/>
  <circle cx="256" cy="256" r="118" fill="none" stroke="#2d2d3a" stroke-width="0.7" opacity="0.6"/>
  <circle cx="256" cy="256" r="106" fill="none" stroke="#2d2d3a" stroke-width="0.7" opacity="0.6"/>

  <!-- Light reflection on vinyl -->
  <ellipse cx="310" cy="190" rx="90" ry="45" fill="white" opacity="0.04" transform="rotate(-30,310,190)"/>

  <!-- Center label -->
  <circle cx="256" cy="256" r="85" fill="url(#label)" stroke="url(#gold)" stroke-width="2.5"/>

  <!-- Label decoration ring -->
  <circle cx="256" cy="256" r="70" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>

  <!-- Center hole -->
  <circle cx="256" cy="256" r="8" fill="#1a1a20" stroke="#333" stroke-width="1"/>

  <!-- Musical note (larger, more prominent) -->
  <g transform="translate(256,252) scale(1.3)" fill="url(#gold)">
    <!-- Note head 1 -->
    <ellipse cx="-12" cy="16" rx="13" ry="10" transform="rotate(-20,-12,16)"/>
    <!-- Note head 2 -->
    <ellipse cx="12" cy="6" rx="13" ry="10" transform="rotate(-20,12,6)"/>
    <!-- Stems -->
    <rect x="-1" y="-42" width="3.5" height="58" rx="1.75"/>
    <rect x="23" y="-32" width="3.5" height="38" rx="1.75"/>
    <!-- Beam -->
    <polygon points="-1,-42 26.5,-32 26.5,-26 -1,-36"/>
  </g>
</svg>